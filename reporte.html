<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reporte de Inscripciones</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="icon" href="icono-192.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#4f46e5,#06b6d4);
            min-height:100vh;
            font-family:'Segoe UI',sans-serif;
        }


        .card{
            border-radius:20px;
            padding:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.2);
        }

        h2{
            color:#4338ca;
            text-align:center;
            margin-bottom:20px;
        }
    </style>
</head>

<body>

<div class="container contenedor">

    <div class="card">

        <h2>Reporte de Inscripciones</h2>

        <table class="table table-bordered table-striped">

            <thead class="table-primary">
                <tr>
                    <th>Fecha del Registro</th>
                    <th>Nombre</th>
                    <th>Apellido Paterno</th>
                    <th>Apellido Materno</th>
                    <th>Celular</th>
                    <th>Correo</th>
                    <th>Edad</th>
                    <th>Promedio</th>
                    <th>Grado</th>
                    <th>Tutor</th>
                    <th>Escuela</th>
                    <th>Fecha</th>
                </tr>
            </thead>

            <tbody id="tablaRegistros">

            </tbody>

        </table>

        <div class="text-center">

            <a href="index.html" class="btn btn-primary">
                Regresar
            </a>

        </div>

    </div>

</div>

<script>

let tabla = document.getElementById("tablaRegistros");

let registros = JSON.parse(localStorage.getItem("registros")) || [];

registros.forEach(registro => {

    tabla.innerHTML += `
    <tr>
        <td>${registro.fecha}</td>
        <td>${registro.nombre}</td>
        <td>${registro.paterno}</td>
        <td>${registro.materno}</td>
        <td>${registro.celular}</td>
        <td>${registro.correo}</td>
        <td>${registro.edad}</td>
        <td>${registro.promedio}</td>
        <td>${registro.grado}</td>
        <td>${registro.nombreTutor}</td>
        <td>${registro.nombreEscuela}</td>
        <td>${registro.fecha}</td>
    </tr>
    `;

});

if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
